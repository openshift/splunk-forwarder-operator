        name: cluster
        patch: '{"spec":{"audit":{"profile":"WriteRequestBodies"}}}'
        patchType: merge
      resources:
      - apiVersion: apps/v1
        kind: DaemonSet
        metadata: &id002
          labels: &id001
            app: audit-exporter
          name: audit-exporter
          namespace: openshift-security
        spec:
          selector:
            matchLabels: *id001
          template:
            metadata: *id002
            spec:
              automountServiceAccountToken: false
              containers:
              - name: audit-exporter
                command:
                - /bin/audit-exporter
                - --log-file=/var/log/osd-audit/audit.log
                - --tls-cert-file=/certs/tls.crt
                - --tls-private-key-file=/certs/tls.key
                resources:
                  requests:
                    memory: 256Mi
                  limits:
                    cpu: 100m
                    memory: 256Mi
                image: quay.io/app-sre/splunk-audit-exporter@sha256:798113f5c79248bc24418ff0d149058c04e5eaa35ea7b4ff42a1e6983a37d24a # 0.1.213-118042f
                imagePullPolicy: Always
                securityContext:
                  privileged: true
                  runAsUser: 0
                volumeMounts:
                - mountPath: /config
                  name: config
                - mountPath: /var/log
                  name: logs
                - mountPath: /certs
                  name: tls-certs-secret
                  readOnly: true
              nodeSelector:
                node-role.kubernetes.io/master: ''
              restartPolicy: Always
              ports:
              - containerPort: 9090
                name: metrics
                protocol: TCP
              terminationGracePeriodSeconds: 5
              tolerations:
              - operator: Exists
              volumes:
              - name: config
                configMap:
                  name: osd-audit-policy
              - name: tls-certs-secret
                secret:
                  secretName: audit-exporter-certs
              - name: logs
                hostPath:
                  type: Directory
                  path: /var/log
      - apiVersion: v1
        kind: Service
        metadata:
          labels:
            app: audit-exporter
          name: audit-exporter
          namespace: openshift-security
          annotations:
            service.beta.openshift.io/serving-cert-secret-name: audit-exporter-certs
        spec:
          ports:
            - name: metrics
              port: 9090
              protocol: TCP
              targetPort: 9090
          selector:
            app: audit-exporter
          sessionAffinity: None
          type: ClusterIP
      - apiVersion: monitoring.coreos.com/v1
        kind: ServiceMonitor
        metadata:
          name: audit-exporter
          namespace: openshift-security
        spec:
          endpoints:
            - path: /metrics
              port: metrics
              scheme: https
              tlsConfig:
                caFile: /var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt
                serverName: audit-exporter.openshift-security.svc
          namespaceSelector: {}
          selector:
            matchLabels:
              app: audit-exporter
      - apiVersion: v1
        kind: Service
        metadata:
          labels:
            name: splunk-forwarder
          name: splunk-forwarder
          namespace: openshift-security
        spec:
          ports:
            - name: metrics
              port: 8090
              protocol: TCP
              targetPort: 8090
          selector:
            name: splunk-forwarder
          sessionAffinity: None
          type: ClusterIP
      - apiVersion: monitoring.coreos.com/v1
        kind: ServiceMonitor
        metadata:
          name: splunk-forwarder
          namespace: openshift-security
        spec:
          endpoints:
            - path: /metrics
              port: metrics
              scheme: http
          namespaceSelector: {}
          selector:
            matchLabels:
              name: splunk-forwarder
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: prometheus-k8s
          namespace: openshift-security
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: Role
          name: prometheus-k8s
        subjects:
          - kind: ServiceAccount
            name: prometheus-k8s
            namespace: openshift-monitoring
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        metadata:
          name: prometheus-k8s
          namespace: openshift-security
        rules:
          - apiGroups: [""]
            resources: ["services", "endpoints", "pods", "servicemonitors"]
            verbs: ["get", "list", "watch"]

