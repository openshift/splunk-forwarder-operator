  # SSS: Audit policy — patch + DaemonSet, Services, ServiceMonitors, Roles
  - apiVersion: hive.openshift.io/v1
    kind: SelectorSyncSet
    metadata:
      name: splunk-forwarder-operator-audit-policy-stage
    spec:
      clusterDeploymentSelector:
