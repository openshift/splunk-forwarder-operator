                metadata:
                  annotations:
                    control-plane.alpha.kubernetes.io/leader: remove
                    kubectl.kubernetes.io/last-applied-configuration: remove
                  generation: remove
                  uid: remove
                  selfLink: remove
                  managedFields: remove
                  resourceVersion: remove
                  creationTimestamp: remove
                status:
                  conditions: remove
                  components: remove
                  relatedObjects: remove
                  lastSyncTimestamp: remove
                  storageBucket:
                    lastSyncTimestamp: remove
            # redact manifests data from ManifestWork objects deployed to service-clusters
            - group: work.open-cluster-management.io
              resources:
              - manifestworks
              fields:
                spec:
                  workload:
                    manifests: replace
                status:
                  resourceStatus:
                    manifests: replace
            exposeAsMetric:
              - eventSelector:
                  user:
                    username:
                      NotIn: ["system:*"]
                  verb:
                    In: ["delete", "update", "patch"]
                  objectReference:
                    name:
                      In: ["sre-*", "*openshift.io"]
                    resource:
                      In: ["validatingwebhookconfigurations"]
                  responseStatus:
                    code:
                      NotIn: ["403"]
                alert: NonSystemChangeValidationWebhookConfiguration
              - eventSelector:
                    user:
                      username:
                        NotIn: ["system:*"]
                    verb:
