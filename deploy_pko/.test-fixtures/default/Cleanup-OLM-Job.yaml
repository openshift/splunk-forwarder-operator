---
# This Job cleans up old OLM resources after migrating to PKO
# IMPORTANT: Review and customize this template before deploying!
# 
# Things to customize:
# 1. Adjust the namespace if needed
# 2. Modify resource filters (CSV names, labels, etc.)
# 3. Review RBAC permissions
# 4. Update the cleanup logic for your specific operator
#
apiVersion: v1
kind: ServiceAccount
metadata:
  name: olm-cleanup
  namespace: openshift-splunk-forwarder-operator
  annotations:
    package-operator.run/phase: cleanup-rbac
    package-operator.run/collision-protection: IfNoController
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: olm-cleanup
  namespace: openshift-splunk-forwarder-operator
  annotations:
    package-operator.run/phase: cleanup-rbac
    package-operator.run/collision-protection: IfNoController
rules:
  # CUSTOMIZE: Adjust permissions as needed for your cleanup tasks
  - apiGroups:
      - operators.coreos.com
    resources:
      - clusterserviceversions
      - subscriptions
      - catalogsources
    verbs:
      - list
      - get
      - watch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: olm-cleanup
  namespace: openshift-splunk-forwarder-operator
  annotations:
    package-operator.run/phase: cleanup-rbac
    package-operator.run/collision-protection: IfNoController
roleRef:
  kind: Role
  name: olm-cleanup
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: olm-cleanup
    namespace: openshift-splunk-forwarder-operator
---
apiVersion: batch/v1
kind: Job
metadata:
  name: olm-cleanup
  namespace: openshift-splunk-forwarder-operator
  annotations:
    package-operator.run/phase: cleanup-deploy
    package-operator.run/collision-protection: IfNoController
spec:
  ttlSecondsAfterFinished: 100
  template:
    metadata:
      annotations:
        openshift.io/required-scc: restricted-v2
    spec:
      serviceAccountName: olm-cleanup
      priorityClassName: openshift-user-critical
      restartPolicy: Never
      containers:
        - name: delete-csv
          image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              #!/bin/sh
              set -euxo pipefail
              # Delete CSV
              oc -n openshift-splunk-forwarder-operator delete csv -l "operators.coreos.com/splunk-forwarder-operator.openshift-splunk-forwarder-operator" --ignore-not-found=true

              # Delete Subscription (specify API group to avoid ambiguity with OCM subscriptions)
              oc -n openshift-splunk-forwarder-operator delete subscription.operators.coreos.com openshift-splunk-forwarder-operator --ignore-not-found=true

              # Delete CatalogSource (specify API group for consistency)
              oc -n openshift-splunk-forwarder-operator delete catalogsource.operators.coreos.com splunk-forwarder-operator-catalog --ignore-not-found=true
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
